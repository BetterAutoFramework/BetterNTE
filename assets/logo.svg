<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#0097b9"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="64" ry="64"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Decorative circles -->
    <circle cx="400" cy="100" r="180" fill="#00d2ff" opacity="0.06"/>
    <circle cx="120" cy="420" r="140" fill="#00d2ff" opacity="0.04"/>

    <!-- Crosshair / vision element -->
    <circle cx="256" cy="210" r="80" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
    <circle cx="256" cy="210" r="50" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
    <line x1="256" y1="120" x2="256" y2="150" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
    <line x1="256" y1="270" x2="256" y2="300" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
    <line x1="166" y1="210" x2="196" y2="210" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
    <line x1="316" y1="210" x2="346" y2="210" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>

    <!-- Corner brackets -->
    <path d="M120,100 L120,80 L140,80" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <path d="M392,100 L392,80 L372,80" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <path d="M120,320 L120,340 L140,340" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <path d="M392,320 L392,340 L372,340" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>

    <!-- Main text "NTE" -->
    <text x="256" y="225" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="96" font-weight="700" fill="white" letter-spacing="8">NTE</text>

    <!-- Subtitle "Better" -->
    <text x="256" y="290" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="300" fill="url(#accent)" letter-spacing="16">BETTER</text>

    <!-- Bottom tagline -->
    <text x="256" y="400" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#8892b0" letter-spacing="4">COMPUTER VISION AUTOMATION</text>

    <!-- Bottom accent line -->
    <rect x="176" y="420" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.4"/>
  </g>
</svg>
