name: build-opencv-minimal

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-opencv-minimal.yml"

env:
  OPENCV_VERSION: "4.9.0"
  INSTALL_DIR: "${{ github.workspace }}\\opencv-min"

jobs:
  windows-x64:
    runs-on: windows-2022

    steps:
      - name: Checkout OpenCV
        shell: pwsh
        run: |
          git clone --branch $env:OPENCV_VERSION --depth 1 https://github.com/opencv/opencv.git opencv

      - name: Configure minimal OpenCV
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-S", "opencv",
            "-B", "opencv-build",
            "-G", "Visual Studio 17 2022",
            "-A", "x64",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_DIR",
            "-DBUILD_LIST=core,imgproc",
            "-DBUILD_opencv_world=OFF",
            "-DBUILD_SHARED_LIBS=ON",
            "-DBUILD_TESTS=OFF",
            "-DBUILD_PERF_TESTS=OFF",
            "-DBUILD_EXAMPLES=OFF",
            "-DBUILD_DOCS=OFF",
            "-DBUILD_JAVA=OFF",
            "-DBUILD_opencv_python_bindings_generator=OFF",
            "-DBUILD_opencv_python_tests=OFF",
            "-DWITH_OPENCL=OFF",
            "-DWITH_FFMPEG=OFF",
            "-DWITH_GSTREAMER=OFF",
            "-DWITH_MSMF=OFF",
            "-DWITH_DSHOW=OFF"
          )
          cmake @cmakeArgs

      - name: Build and install
        shell: pwsh
        run: |
          cmake --build opencv-build --config Release --target INSTALL

      - name: Inspect output
        shell: pwsh
        run: |
          Get-ChildItem "$env:INSTALL_DIR" -Recurse -Include "*.dll","*.lib" |
            Select-Object FullName, Length

      - name: Upload OpenCV minimal artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-4.9.0-minimal-windows-x64
          path: |
            ${{ env.INSTALL_DIR }}\bin\opencv_core490.dll
            ${{ env.INSTALL_DIR }}\bin\opencv_imgproc490.dll
            ${{ env.INSTALL_DIR }}\lib\opencv_core490.lib
            ${{ env.INSTALL_DIR }}\lib\opencv_imgproc490.lib
            ${{ env.INSTALL_DIR }}\include
